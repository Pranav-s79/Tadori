name: ci
on:
  push:
    branches: [main, "Sprint*"]
  pull_request:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # validate_fixtures.py degrades to exit 1 without jsonschema installed.
      - run: python -m pip install jsonschema
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm skills:check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: python validate_fixtures.py
      - run: pnpm fixtures:validate
      - run: pnpm fixtures:index
      - run: pnpm fixtures:typecheck
      - run: pnpm tadori diff .
      - run: git diff --check
      # Tree-mutation guard: stages every modification and untracked file,
      # then fails if anything differs from HEAD. `git status --porcelain`
      # must not be used here - it always exits 0.
      - run: |
          git add -A
          git diff --cached --exit-code
